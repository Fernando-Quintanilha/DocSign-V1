# docker-compose.prod.yml  —  HoleriteSign Production
# ─────────────────────────────────────────────────────────────
# Usage (standalone):
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# For Dokploy: paste this file in the Compose editor and set
# env vars in the Environment tab.  See .env.prod.example.

services:
  # ── PostgreSQL 16 ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-holeritesign}
      POSTGRES_USER: ${POSTGRES_USER:-holeritesign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-holeritesign}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hs-internal

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_prod_secret}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_prod_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hs-internal

  # ── MinIO (S3-compatible) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hs-internal

  # ── MinIO bucket bootstrap ───────────────────────────────
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/holeritesign --ignore-existing;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    networks:
      - hs-internal

  # ── API (.NET 8) ──────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        CACHEBUST: "${CACHEBUST:-15}"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # ── Database ─────────────────────────────────────────
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-holeritesign};Username=${POSTGRES_USER:-holeritesign};Password=${POSTGRES_PASSWORD:-changeme}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redis_prod_secret}"
      # ── JWT ──────────────────────────────────────────────
      Jwt__Secret: ${JWT_SECRET:?Set JWT_SECRET (min 32 chars)}
      Jwt__Issuer: HoleriteSign
      Jwt__Audience: HoleriteSign
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION:-60}
      # ── Storage (MinIO) ─────────────────────────────────
      Storage__Endpoint: http://minio:9000
      Storage__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      Storage__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin}
      Storage__BucketName: holeritesign
      Storage__UseSSL: "false"
      # ── App URLs ────────────────────────────────────────
      App__FrontendUrl: ${FRONTEND_URL:-https://th-sistema.sbs}
      App__BaseApiUrl: ${API_BASE_URL:-https://th-sistema.sbs}
      # ── SMTP ────────────────────────────────────────────
      Smtp__Host: ${SMTP_HOST:-smtp.gmail.com}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__User: ${SMTP_USER:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__From: ${SMTP_FROM:-}
      Smtp__FromName: ${SMTP_FROM_NAME:-HoleriteSign}
      # ── Encryption ──────────────────────────────────────
      Encryption__Key: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY (min 32 chars)}
      # ── WhatsApp (Evolution API) ─────────────────────
      WhatsApp__BaseUrl: http://evolution:8080
      WhatsApp__ApiKey: ${EVOLUTION_API_KEY:-CHANGE_ME_IN_PRODUCTION}
      WhatsApp__InstanceName: ${WHATSAPP_INSTANCE_NAME:-holeritesign}
      # ── Super Admin seed ────────────────────────────────
      SuperAdmin__Email: ${SUPERADMIN_EMAIL:-superadmin@holeritesign.com}
      SuperAdmin__Password: ${SUPERADMIN_PASSWORD:-Super@123}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - hs-internal

  # ── Evolution API (WhatsApp) ───────────────────────────────
  evolution:
    image: atendai/evolution-api:v2.1.1
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      DOCKER_ENV: "true"
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://evolution:8080}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-CHANGE_ME_IN_PRODUCTION}
      DATABASE_ENABLED: "false"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${EVOLUTION_DATABASE_URI:-postgresql://holeritesign:changeme@postgres:5432/holeritesign?schema=evolution}
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: "false"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"
      DATABASE_SAVE_DATA_LABELS: "false"
      DATABASE_SAVE_DATA_HISTORIC: "false"
      CACHE_REDIS_ENABLED: "false"
      CACHE_REDIS_URI: ${EVOLUTION_REDIS_URI:-redis://:changeme@redis:6379/1}
      CACHE_REDIS_PREFIX_KEY: "evolution"
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      LOG_LEVEL: "ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS"
      DEL_INSTANCE: "false"
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      STORE_CONTACTS: "true"
      STORE_CHATS: "true"
      QRCODE_LIMIT: 30
      CONFIG_SESSION_PHONE_CLIENT: "HoleriteSign"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
      QRCODE_COLOR: "#000000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - hs-internal

  # ── Frontend (Nginx + React SPA) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        CACHEBUST: "${FRONTEND_CACHEBUST:-15}"
    restart: always
    depends_on:
      api:
        condition: service_healthy
    networks:
      - hs-internal
      - dokploy-network

volumes:
  pgdata:
  miniodata:
  evolution_instances:

networks:
  hs-internal:
    driver: bridge
  dokploy-network:
    external: true
