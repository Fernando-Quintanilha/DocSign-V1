services:
  # ── PostgreSQL 16 ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hs-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: holeritesign
      POSTGRES_USER: holeritesign
      POSTGRES_PASSWORD: holeritesign_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holeritesign"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible storage) ─────────────────────────
  minio:
    image: minio/minio:latest
    container_name: hs-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO bootstrap (create bucket on first run) ──────────
  minio-setup:
    image: minio/mc:latest
    container_name: hs-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/holeritesign --ignore-existing;
      mc anonymous set download local/holeritesign;
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
